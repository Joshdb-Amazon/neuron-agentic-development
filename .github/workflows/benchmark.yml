name: NAD Benchmark

# Single-repo NAD skill benchmark gate.
#
# Everything the gate needs lives in THIS repo: the inputs it scores
# (skills/, agents/, tests/, tests/registry.json) at the repo root, and the
# grader under benchmark/ (run_skill_tests.py + shell/ + environment/Dockerfile). This
# workflow is self-contained — it runs the grader directly against the repo
# root, so a PR that changes the inputs OR the grader is scored against this
# repo's own assets.

on:
  # PR gate — runs when either the inputs OR the grader change.
  pull_request:
    paths:
      - 'skills/**'
      - 'agents/**'
      - 'tests/**'
      - 'benchmark/**'
      - '.github/workflows/benchmark.yml'

  workflow_dispatch:
    inputs:
      subset:
        description: "Subset(s): 'all', a single name, or a comma-separated list"
        default: 'all'
      count:
        description: 'Pass@k attempts per scenario'
        default: '1'
      gate:
        description: 'Required pass rate (0-100); job fails below this'
        default: '90'

permissions:
  contents: read

concurrency:
  group: nad-benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: NAD ${{ github.event.inputs.subset || 'all' }} benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run NAD benchmark
        env:
          # kiro-cli reads KIRO_API_KEY; docker.sh passes it into the container.
          # The same key drives the agent and the judge.
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          set -euo pipefail
          # nad-root '.' scores this checkout's own skills/agents/tests. The judge
          # (25% weight) is on; workers=4. Gate fails the job below the threshold.
          python benchmark/run_skill_tests.py \
            --nad-root=. \
            --subset="${{ github.event.inputs.subset || 'all' }}" \
            --count="${{ github.event.inputs.count || '1' }}" \
            --workers=4 \
            --judge \
            --gate="${{ github.event.inputs.gate || '90' }}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nad-benchmark-results
          path: benchmark/build/nad_benchmark_results.json
          if-no-files-found: warn
